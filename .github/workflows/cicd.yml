name: CI/CD Pipeline

# main 브랜치에 push 시 실행
on:
  push:
    branches:
      - main

# 연속 push 시 이전 실행 취소
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository # 저장소 체크아웃
      uses: actions/checkout@v4

    - name: Set up Docker Buildx # Docker Buildx 설정
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub # DockerHub 로그인
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push # 이미지 빌드 및 push (GitHub Actions 캐시로 레이어 재사용)
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/${{ secrets.PROJECT_NAME }}:${{ github.sha }}
          ${{ secrets.DOCKER_USERNAME }}/${{ secrets.PROJECT_NAME }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-22.04
    needs: build # build 완료 후 실행

    steps:
    - name: Deploy to server # 서버에 SSH 접속하여 배포
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          # 최신 이미지 pull
          docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.PROJECT_NAME }}:latest

          # 기존 컨테이너 중지 및 삭제 (없으면 무시)
          docker stop ${{ secrets.PROJECT_NAME }} || true
          docker rm ${{ secrets.PROJECT_NAME }} || true

          # 새 컨테이너 실행 (.env 주입, NPM과 같은 네트워크 연결, 재부팅 시 자동 시작)
          docker run -d \
            --name ${{ secrets.PROJECT_NAME }} \
            --restart unless-stopped \
            -v ${{ secrets.ENV_PATH }}:/var/www/html/.env \
            --network ${{ secrets.NETWORK_NAME }} \
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.PROJECT_NAME }}:latest

          # 미사용 이미지 정리
          docker image prune -f
